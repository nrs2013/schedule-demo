<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1f1f1d">
<title>SCHEDULE STUDIO — リハーサル進行表</title>
<style>
  :root{
    --bg:#1f1f1d;
    --bg-2:#262624;
    --surface:#323230;
    --surface-2:#2e2e2b;
    --border:#46463f;
    --text:#ece6d8;
    --text-2:#a8a8a0;
    --text-3:#76766f;
    --accent:#c186c8;
    --done:#7ec27a;
    --now:#e6c870;
    --warn:#e07a5f;
    --btn-monitor:#5b9bd5;
    --btn-furi:#c186c8;
    --btn-oto:#e6c870;
    --btn-bagari:#e07a5f;
    --btn-koutou:#7ec27a;
    --btn-zentai:#d4a574;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;font-weight:500;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;padding-bottom:80px}
  .header{background:linear-gradient(180deg,var(--bg-2),var(--bg));padding:18px 18px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
  .brand{font-family:'Bebas Neue','Impact',sans-serif;font-size:14px;letter-spacing:.18em;color:var(--text-3);margin-bottom:4px}
  .title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:.02em}
  .sub{font-size:13px;color:var(--text-2);margin-top:4px;display:flex;align-items:center;gap:8px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--done);box-shadow:0 0 8px var(--done)}
  .progress{margin-top:12px;display:flex;align-items:center;gap:10px}
  .bar{flex:1;height:4px;background:var(--surface);border-radius:2px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--done));border-radius:2px;transition:width .6s ease}
  .progress-txt{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.1em;color:var(--text-2)}
  .tabs{display:flex;gap:6px;margin-top:14px;background:var(--surface);padding:4px;border-radius:8px}
  .tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;color:var(--text-2);border-radius:6px;cursor:pointer;letter-spacing:.05em}
  .tab.active{background:var(--surface-2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .list{padding:14px}
  .item{display:flex;align-items:stretch;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:all .35s ease;position:relative}
  .item.done{opacity:.55}
  .item.now{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 24px rgba(193,134,200,.25);transform:scale(1.005)}
  .item.now::before{content:"";position:absolute;top:0;bottom:0;left:0;width:3px;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .item-num{padding:14px 0 14px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:48px}
  .num-bg{width:34px;height:34px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text-2);letter-spacing:0}
  .item.now .num-bg{background:var(--accent);color:#1f1f1d;border-color:var(--accent)}
  .item.done .num-bg{background:var(--done);color:#1f1f1d;border-color:var(--done)}
  .item-body{flex:1;padding:14px 12px}
  .song-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:.01em;line-height:1.2}
  .item.done .song-title{text-decoration:line-through;text-decoration-color:var(--text-3)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{font-size:11px;padding:3px 9px;border-radius:4px;font-weight:700;letter-spacing:.06em;color:#1f1f1d}
  .tag.monitor{background:var(--btn-monitor)}
  .tag.furi{background:var(--btn-furi)}
  .tag.oto{background:var(--btn-oto)}
  .tag.bagari{background:var(--btn-bagari)}
  .tag.koutou{background:var(--btn-koutou)}
  .tag.zentai{background:var(--btn-zentai)}
  .memo{font-size:12px;color:var(--text-2);margin-top:8px;padding:6px 10px;background:var(--bg-2);border-radius:5px;border-left:2px solid var(--border)}
  .item-action{display:flex;align-items:center;padding:0 12px}
  .btn-finish{padding:10px 14px;background:transparent;border:1px solid var(--border);color:var(--text-2);font-weight:700;font-size:11px;border-radius:6px;cursor:pointer;letter-spacing:.08em;font-family:inherit;transition:all .2s}
  .btn-finish:hover{background:var(--accent);color:#1f1f1d;border-color:var(--accent)}
  .item.done .btn-finish{background:var(--done);color:#1f1f1d;border-color:var(--done);pointer-events:none}
  .item.done .btn-finish::before{content:"✓ "}
  .item.done .btn-finish-text::after{content:"完了"}
  .item:not(.done) .btn-finish-text::after{content:"終了"}
  .empty{text-align:center;padding:40px 20px;color:var(--text-3)}
  .footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg-2);border-top:1px solid var(--border);padding:10px 14px;display:flex;justify-content:space-around;backdrop-filter:blur(8px)}
  .ftab{flex:1;text-align:center;padding:8px;color:var(--text-3);font-size:11px;font-weight:700;letter-spacing:.06em;cursor:pointer}
  .ftab.active{color:var(--accent)}
  .ftab-icon{font-size:20px;margin-bottom:2px;display:block}
  .now-banner{background:linear-gradient(135deg,#3a2e3d,#2e2630);border:1px solid var(--accent);border-radius:10px;padding:14px;margin:14px 14px 0;display:flex;align-items:center;justify-content:space-between}
  .now-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.18em;color:var(--accent);margin-bottom:4px}
  .now-song{font-size:18px;font-weight:700}
  .countdown{font-family:'JetBrains Mono','SF Mono',monospace;font-size:24px;font-weight:700;color:var(--now)}
</style>
</head>
<body>
<div class="header">
  <div class="brand">SCHEDULE STUDIO</div>
  <div class="title">櫻坂46 5th Anniversary Live</div>
  <div class="sub"><span class="dot"></span>2026/4/29（水）リハーサル進行中</div>
  <div class="progress">
    <div class="bar"><div class="bar-fill" id="bar"></div></div>
    <div class="progress-txt" id="progressTxt">0/5</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab(0,this)">リハ順</div>
    <div class="tab" onclick="setTab(1,this)">セトリ順</div>
  </div>
</div>

<div class="now-banner" id="nowBanner" style="display:none">
  <div>
    <div class="now-label">▶ NOW</div>
    <div class="now-song" id="nowSong">—</div>
  </div>
  <div class="countdown" id="countdown">--:--</div>
</div>

<div class="list" id="list"></div>

<div class="footer">
  <div class="ftab active"><span class="ftab-icon">📋</span>進行</div>
  <div class="ftab"><span class="ftab-icon">🎵</span>セトリ</div>
  <div class="ftab"><span class="ftab-icon">💬</span>連絡</div>
  <div class="ftab"><span class="ftab-icon">📍</span>マップ</div>
</div>

<script>
const data = [
  {rh:1, set:1,  title:"OPENING VCR + Start Of The Show", tags:["bagari","zentai"], memo:"場当たり込み・銀テのタイミング確認", done:false, now:false},
  {rh:2, set:5,  title:"五月雨よ", tags:["oto","furi"], memo:"間奏の振り入れあり・音量レベルチェック", done:false, now:false},
  {rh:3, set:8,  title:"Dance Track #2", tags:["furi","monitor"], memo:"4期生フォーメーション確認", done:false, now:true},
  {rh:4, set:12, title:"流れ弾", tags:["oto","bagari","monitor"], memo:"日替わりver / メインカメラ位置", done:false, now:false},
  {rh:5, set:18, title:"Nobody's fault", tags:["zentai"], memo:"ENCORE通し・特効タイミング", done:false, now:false},
];

let currentTab = 0;

function tagLabel(t){return {monitor:"モニター",furi:"振付",oto:"音",bagari:"場当たり",koutou:"口答",zentai:"全体"}[t]}

function render(){
  const list = document.getElementById('list');
  const sorted = currentTab===0
    ? [...data].sort((a,b)=>a.rh-b.rh)
    : [...data].sort((a,b)=>a.set-b.set);

  list.innerHTML = sorted.map(item=>{
    const cls = item.done ? 'done' : (item.now ? 'now' : '');
    const numLabel = currentTab===0 ? `①②③④⑤`[item.rh-1] : `M${item.set}`;
    const tagsHtml = item.tags.map(t=>`<span class="tag ${t}">${tagLabel(t)}</span>`).join('');
    return `
      <div class="item ${cls}" data-rh="${item.rh}">
        <div class="item-num"><div class="num-bg">${numLabel}</div></div>
        <div class="item-body">
          <div class="song-title">${item.title}</div>
          <div class="tags">${tagsHtml}</div>
          ${item.memo ? `<div class="memo">${item.memo}</div>` : ''}
        </div>
        <div class="item-action">
          <button class="btn-finish" onclick="finish(${item.rh})"><span class="btn-finish-text"></span></button>
        </div>
      </div>
    `;
  }).join('');

  const doneCount = data.filter(d=>d.done).length;
  const total = data.length;
  document.getElementById('bar').style.width = (doneCount/total*100)+'%';
  document.getElementById('progressTxt').textContent = `${doneCount}/${total}`;

  const nowItem = data.find(d=>d.now);
  const banner = document.getElementById('nowBanner');
  if(nowItem){
    banner.style.display='flex';
    document.getElementById('nowSong').textContent = nowItem.title;
  } else {
    banner.style.display='none';
  }
}

function finish(rh){
  const idx = data.findIndex(d=>d.rh===rh);
  if(idx<0) return;
  data[idx].done = true;
  data[idx].now = false;
  // 次の未完了項目をnowに
  const next = data.find(d=>!d.done && d.rh > rh);
  if(next) next.now = true;
  render();
}

function setTab(i, el){
  currentTab = i;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// カウントダウン演出
let cd = 4*60+32;
setInterval(()=>{
  cd = Math.max(0, cd-1);
  const m = String(Math.floor(cd/60)).padStart(2,'0');
  const s = String(cd%60).padStart(2,'0');
  const el = document.getElementById('countdown');
  if(el) el.textContent = `${m}:${s}`;
},1000);

render();
</script>
</body>
</html>
